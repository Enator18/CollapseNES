MEMORY {
    #ZEROPAGE
    ZP:     file = "", start = $0000, size = $0100, type = rw, define = yes;

    # INES Cartridge Header
    HEADER: file = %O, start = $0000, size = $0010, fill = yes;

    #PRG ROM
    PRG:   file = %O, start = $8000, size = $8000, fill = yes, define = yes, bank = $00;

    #CHR ROM
    CHR:   file = %O, start = $0000, size = $2000, fill = yes;

    #SRAM
    RAM:   file = "", start = $0400, size = $0400, define = yes;
}
SEGMENTS {
    ZEROPAGE: load = ZP,              type = zp;
    HEADER:   load = HEADER,          type = ro;
    PRG:     load = PRG,       type = ro,  define   = yes;
    VECTORS:  load = PRG,       type = ro,  start    = $FFFA;
    CHARS:    load = CHR,             type = ro;
    RAM:     load = RAM,         type = rw,  define   = yes;
}